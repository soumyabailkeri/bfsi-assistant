version: '3.8'

services:
  api:
    build: .
    ports:
      - "8002:8002"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=postgresql://bfsi_user:bfsi123@db/bfsi_assistant_db
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=bfsi_assistant_db
      - POSTGRES_USER=bfsi_user
      - POSTGRES_PASSWORD=bfsi123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: